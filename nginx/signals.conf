# nginx/signals.conf — Phase 12 (HTTPS + Domain Wiring)
#
# Domain hardcoded to signals.mwiriadi.me (D-01 placeholder substitution
# was completed during droplet bring-up; the original generic placeholder
# is no longer present).
#
# Cert bootstrap path actually used on droplet 209.38.30.13:
#   sudo certbot certonly --standalone -d signals.mwiriadi.me
# This is HTTP-01 challenge via certbot's own briefly-bound port-80 server.
# NOT `certbot --nginx`. Reason: the committed 443 block exists BEFORE any
# cert is issued, and `certbot --nginx` runs `nginx -t` to validate before
# injecting cert paths. A 443 block with no `ssl_certificate` fails
# `nginx -t`. Chicken-and-egg. `certonly --standalone` sidesteps nginx
# entirely (briefly stops it, runs HTTP-01 on port 80, writes only the
# cert files). Operator then added the `ssl_certificate*` directives below
# manually and reloaded.
#
# Cloudflare DNS proxy MUST be DISABLED (grey-cloud) during ACME issuance
# or HTTP-01 fails with 521 at origin. Re-enable proxy AFTER cert issuance
# is fine — Cloudflare terminates TLS independently of origin.
#
# nginx version: Ubuntu 22.04/24.04 ships nginx 1.24, which does NOT
# support the standalone `http2 on;` directive (added in nginx 1.25).
# We use the inline `listen 443 ssl http2;` form instead.
#
# Auto-renewal handled by certbot's systemd timer (`certbot.timer`).
# Manual renewal would also use `certonly --standalone` (briefly stop
# nginx, run certbot, restart). The /.well-known/acme-challenge/
# carve-outs in both server blocks are safety nets for `--webroot`-style
# manual renewal — not the primary path.
#
# Phase 12 requirements covered: WEB-03 (nginx + Let's Encrypt + certbot
# timer) and WEB-04 (HSTS exact value per D-12; HSTS preload submission
# intentionally omitted to keep a TLS rollback escape hatch).
#
# Operator decision: cert paths in git is acceptable for this single-
# domain deployment (no multi-tenant cert juggling).

# D-10: rate-limit zone at http{} scope. nginx inherits `limit_req` into
# nested scopes ONLY when no child-level `limit_req` exists — so the
# /.well-known/acme-challenge/ block below disables rate-limit for ACME
# challenges (T-12-02). [CITED: nginx limit_req module docs]
limit_req_zone $binary_remote_addr zone=healthz:10m rate=10r/m;

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name signals.mwiriadi.me;

  # --- TLS tuning — Mozilla Intermediate profile (2024 rev) ---
  # [CITED: https://ssl-config.mozilla.org/ — Mozilla SSL Configuration Generator]
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # --- OCSP stapling ---
  # OCSP stapling uses the chain from ssl_certificate (fullchain.pem) — no
  # separate ssl_trusted_certificate needed when fullchain is in use.
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 8.8.8.8 valid=300s;
  resolver_timeout 5s;

  # ssl_certificate paths added manually after `certbot certonly --standalone`
  # bootstrap (see top-of-file). Cert path leak into git is accepted for this
  # single-domain deployment.
  ssl_certificate /etc/letsencrypt/live/signals.mwiriadi.me/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/signals.mwiriadi.me/privkey.pem;

  # --- Security headers (D-11 — ALL at server scope, ALL `always`) ---
  # `always` flag ensures emission on 4xx/5xx too (RESEARCH Pitfall 2).
  # Server scope is mandatory — `add_header` inside a nested scope REPLACES
  # (not extends) parent-scope headers (RESEARCH Pitfall 3). If Phase 13+
  # needs per-route headers, ALL security headers must be redeclared there,
  # OR use the third-party headers-more-nginx-module.
  add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
  add_header X-Content-Type-Options 'nosniff' always;
  add_header X-Frame-Options 'DENY' always;
  add_header Referrer-Policy 'strict-origin-when-cross-origin' always;

  # --- Let's Encrypt ACME challenge carve-out (D-09, T-12-02) ---
  # Nested block with NO limit_req disables rate-limit for ACME.
  # certbot's --nginx plugin serves files from a temp webroot during renewal.
  location /.well-known/acme-challenge/ {
    try_files $uri =404;
  }

  # --- /healthz — rate-limited (D-10) ---
  location = /healthz {
    limit_req zone=healthz burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 5s;
    proxy_connect_timeout 2s;
  }

  # --- Everything else — no rate limit; Phase 13 adds auth ---
  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }
}
